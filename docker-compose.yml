services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: badminton-manager
      POSTGRES_USER: badminton
      POSTGRES_PASSWORD: badminton
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badminton -d badminton-manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/badminton-manager
      DB_USERNAME: badminton
      DB_PASSWORD: badminton
      JWT_SECRET: dev-only-secret-key-change-me-please-32bytes-min
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
