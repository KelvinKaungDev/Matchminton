spring.application.name=badminton
server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/badminton-manager}
spring.datasource.username=${DB_USERNAME:kelvingao}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:dev-only-secret-key-change-me-please-32bytes-min}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

logging.level.com.badminton_manager.badminton=INFO
logging.file.name=logs/badminton.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

app.upload.dir=uploads
app.upload.public-url-prefix=/uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

springdoc.swagger-ui.persist-authorization=true