name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: badminton-manager
          POSTGRES_USER: badminton
          POSTGRES_PASSWORD: badminton
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U badminton"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/badminton-manager
      DB_USERNAME: badminton
      DB_PASSWORD: badminton
      JWT_SECRET: ci-test-secret-key-change-me-please-32bytes-min

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: ./mvnw -B verify

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
